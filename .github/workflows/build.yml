on: [push, pull_request, workflow_dispatch]

permissions:
  contents: write

jobs:
  build:
    uses: zmkfirmware/zmk/.github/workflows/build-user-config.yml@v0.3.0

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download firmware artifact
        # Must match the upload-artifact version used in the ZMK reusable workflow (not using latest)
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: firmware

      - name: Get next version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          latest=$(gh api "repos/${REPO}/releases/latest" --jq '.tag_name' 2>/dev/null || echo "v0")
          echo "tag=v$(( ${latest#v} + 1 ))" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ github.sha }}
        run: |
          gh release create "$TAG" firmware/* \
            --repo "$REPO" \
            --title "Firmware ${TAG}" \
            --notes "Firmware build from commit ${SHA}"
